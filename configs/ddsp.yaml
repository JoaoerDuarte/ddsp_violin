# DDSP baseline: standard DDSP with FIR resonance repurposed as the body filter,
# no source constraints. Matches the "Baseline" row in Table I of the paper.

train:
  name: ddsp_baseline
  root: runs/
  steps: 10000
  batch_size: 8
  loss_window: 100
  save_audio_steps: [1000, 5000, 10000]
  save_audio_num_comparisons: 3
  gradient_clip_norm: 3.0
  learning_rate: 0.001
  lr_decay_steps: 10000
  lr_decay_rate: 0.98
  lr_staircase: false
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  preprocessed_data_dir: preprocessed

preprocess:
  out_dir: preprocessed/ddsp_baseline
  sampling_rate: 16000
  block_size: 64
  signal_length: 64000
  oneshot: false
  crepe_model_path: ''

data:
  data_location: dataset/audio
  extension: wav
  dataset_name: ddsp_baseline

model:
  sampling_rate: 16000
  block_size: 64
  signal_length: 64000
  use_brightness_tilt_standard: false

  encoder:
    use_encoder: true
    rnn_channels: 512
    z_dims: 16
    z_time_steps: 125
    mfcc:
      n_mfcc: 30
      n_mels: 128
      f_min: 20.0
      f_max: 8000.0
      log_mels: true

  decoder:
    n_harmonic: 40
    n_bands: 65
    rnn_channels: 512
    ch: 512
    layers_per_stack: 3
    noise_bias: -5.0
    init_harmonic_1_over_n: false

  helmholtz:
    use_helmholtz_synthesis: false

  use_resonance: true
  resonance_type: convolutional
  resonance_window_size: 2048
  resonance_add_dry: false
  resonance_max_reflection: 0.999
  resonance_position: after_noise
  resonance_normalization_type: rms

  use_room: false

loss:
  mssl:
    scales: [2048, 1024, 512, 256, 128, 64]
    overlap: 0.75

  use_hrl: false
